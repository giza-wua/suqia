<script type="module">
import { requireAuth, clearSession, getCollection, addRecord, updateRecord, deleteRecord, logActivity } from "../js/firebase-config.js?v=1.1.7";
import { wireThemeToggle, arabicDate, DataList, openModal, closeModal, toast, confirmDelete, wireLocationButton, mapsLinkHtml, exportToExcel, exportToPDF, wireConnectionStatus } from "../js/shared.js?v=1.1.7";

const user = requireAuth();

// ── Sidebar ──
(function(){
  const av=document.getElementById('sb-avatar'), nm=document.getElementById('sb-user-name'), rl=document.getElementById('sb-user-role');
  const init=user.name.trim().split(' ').slice(0,2).map(w=>w[0]).join('');
  if(av) av.textContent=init;
  if(nm) nm.textContent=user.name;
  if(rl) rl.textContent=user.role==='admin'?'مشرف':'مستخدم';
  const pg=location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item, .bn-item').forEach(a=>{if(a.getAttribute('href')===pg)a.classList.add('active');});
  const sb=document.getElementById('sidebar'),ov=document.getElementById('sb-overlay'),mb=document.getElementById('mob-btn');
  if(mb) mb.addEventListener('click',()=>{ sb.classList.toggle('open'); ov.classList.toggle('show'); });
  if(ov) ov.addEventListener('click',()=>{ sb.classList.remove('open'); ov.classList.remove('show'); });
  document.getElementById('btn-logout').addEventListener('click',()=>{ logActivity('تسجيل خروج'); clearSession(); location.href='../index.html'; });
})();

wireThemeToggle();
wireConnectionStatus();
document.getElementById('tb-date').textContent = arabicDate();
if (user.role !== 'viewer') {
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
}

const _qParam = new URLSearchParams(location.search).get('q');

// ══ Helpers ══
function normEng(e){ if(!e)return'';e=e.trim(); if(/امبابه|إمبابة|امبابة/i.test(e))return'إمبابة'; if(/الرياح|ري الرياح/i.test(e))return'الرياح'; return e.trim(); }
function coreName(n){ let x=(n||'').trim(); x=x.replace(/^(ترعة|فرع|مسقة|وصلة|دليل|ذيل|إمتداد|مغذى)\s+/,''); x=x.replace(/^["']?\d+["']?\s*/,''); x=x.replace(/^من\s+["']?\d+["']?\s+/,''); x=x.replace(/^["']/,''); return x.trim().replace(/\s+/g,' '); }
function getRotations(spec){ const rots=new Set(); (spec.sections||[]).forEach(s=>{ const r=(s.rotation||'').trim(); if(!r)return; if(/^أ$/.test(r)||r.includes('أ،'))rots.add('أ'); if(/^ب$/.test(r)||r.includes('ب،')||r.includes(',ب'))rots.add('ب'); if(/^جـ$/.test(r)||/^ج$/.test(r)||r.includes('جـ')||r.includes('ج،'))rots.add('جـ'); }); return[...rots].sort(); }
function rotBadgeHtml(rots){ return rots.map(r=>{ const cls=r==='أ'?'rot-a':r==='ب'?'rot-b':'rot-c'; return`<span class="rot-badge ${cls}">${r}</span>`; }).join(''); }
function fixSideSlope(val){ if(!val)return''; const s=String(val).trim(); const m=s.match(/^(\d{1,2}):(\d{2}):00$/); if(m){const h=parseInt(m[1]),mi=parseInt(m[2]);return mi===0?String(h):`${h}:${mi}`;} return s; }

function drawCross(sec){
  const cv=document.getElementById('ccv'); if(!cv)return;
  const dpr=window.devicePixelRatio||1,W=Math.round(cv.clientWidth)||560,H=Math.max(170,Math.min(Math.round(W*.42),280));
  cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const bw=parseFloat(sec.bed_width)||1;let hz=1;
  const ssRaw=fixSideSlope(sec.side_slope)||'';
  if(ssRaw.includes(':'))hz=(parseFloat(ssRaw.split(':')[0])||1)/(parseFloat(ssRaw.split(':')[1])||1);
  else hz=parseFloat(ssRaw)||1;if(!isFinite(hz)||hz>12)hz=1;
  const bl=parseFloat(sec.bed_level)||22,mx=parseFloat(sec.max_water)||(bl+1.5),mn=parseFloat(sec.min_water)||(bl+1);
  const dep=Math.max(mx-bl,0.5),cx=W/2,bedY=H-36,dH=bedY-30;
  const sc=Math.min((W-20)/(bw+2*hz*dep+4),dH/dep*.7);
  const gndY=bedY-dep*sc,bL=cx-bw/2*sc,bR=cx+bw/2*sc,tL=bL-hz*dep*sc,tR=bR+hz*dep*sc;
  ctx.fillStyle='#d4a96a';ctx.beginPath();ctx.moveTo(0,gndY);ctx.lineTo(tL,gndY);ctx.lineTo(bL,bedY);ctx.lineTo(bR,bedY);ctx.lineTo(tR,gndY);ctx.lineTo(W,gndY);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  ctx.save();ctx.strokeStyle='#c4914a';ctx.lineWidth=.7;for(let x=-H;x<W+H;x+=9){ctx.beginPath();ctx.moveTo(x,gndY);ctx.lineTo(x+H,gndY+H);ctx.stroke();}ctx.restore();
  const minD=Math.max(mn-bl,0),dep_sc=dep>0?(bedY-gndY)/dep:1;
  ctx.fillStyle='rgba(30,136,229,.25)';ctx.beginPath();ctx.moveTo(tL,gndY);ctx.lineTo(tR,gndY);ctx.lineTo(bR,bedY);ctx.lineTo(bL,bedY);ctx.closePath();ctx.fill();
  const mnY=bedY-minD*dep_sc,mnL=bL-hz*minD*sc,mnR=bR+hz*minD*sc;
  ctx.fillStyle='rgba(30,136,229,.5)';ctx.beginPath();ctx.moveTo(mnL,mnY);ctx.lineTo(mnR,mnY);ctx.lineTo(bR,bedY);ctx.lineTo(bL,bedY);ctx.closePath();ctx.fill();
  ctx.strokeStyle=isDark?'#cbd5e1':'#0b1f3a';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,gndY);ctx.lineTo(tL,gndY);ctx.lineTo(bL,bedY);ctx.lineTo(bR,bedY);ctx.lineTo(tR,gndY);ctx.lineTo(W,gndY);ctx.stroke();
  ctx.setLineDash([5,3]);ctx.strokeStyle='#1565c0';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tL,gndY);ctx.lineTo(tR,gndY);ctx.stroke();
  ctx.strokeStyle='#64b5f6';ctx.beginPath();ctx.moveTo(mnL,mnY);ctx.lineTo(mnR,mnY);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='#c9a84c';ctx.fillStyle='#8a6a1f';ctx.lineWidth=1;
  const dY=bedY+18;ctx.beginPath();ctx.moveTo(bL,bedY+4);ctx.lineTo(bL,dY);ctx.moveTo(bR,bedY+4);ctx.lineTo(bR,dY);ctx.moveTo(bL,dY);ctx.lineTo(bR,dY);ctx.stroke();
  ctx.font='bold 11px Cairo, Arial';ctx.textAlign='center';ctx.fillText('B='+bw+'م',cx,dY+12);
  ctx.fillStyle='#c62828';ctx.textAlign='left';ctx.fillText('قاع='+sec.bed_level,4,bedY-3);
  ctx.fillStyle='#1565c0';ctx.textAlign='right';ctx.fillText('أقصى='+sec.max_water,W-4,gndY-4);
  ctx.fillStyle='#0277bd';ctx.fillText('أقل='+sec.min_water,W-4,mnY-4);
}

// ══ State ══
let allSpecs=[], liningMap=new Map(), currentItem=null;

// ══ DataList — يتعرّف أولاً ══
const tbl = new DataList({
  containerId:'tbl-container',
  columns:[
    {key:'name',label:'اسم الترعة',searchable:true},
    {key:'_eng',label:'الإدارة الهندسية',searchable:true,renderText:v=>v},
    {key:'length',label:'الطول',renderText:v=>v?v+' كم':''},
    {key:'_rotations',label:'المناوبة',badge:true,render:(v,row)=>{
      const h=rotBadgeHtml(row._rotations||[]);
      const lb=row._lining?'<span class="badge badge-teal" style="font-size:10px;margin-right:3px">مبطنة</span>':'';
      return(h||lb)?`<div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">${h}${lb}</div>`:'';
    }},
  ],
  onRowClick:openView, emptyText:'جاري التحميل…', pageSize:30,
});

// ══ تحميل في الخلفية — بدون spinner ══
(async ()=>{
  try{
    const [specs,lined]=await Promise.all([getCollection('specs'),getCollection('linedCanals')]);
    lined.forEach(l=>{ const key=coreName(l.name||''); if(key)liningMap.set(key,l); });
    allSpecs=specs.map(s=>({...s,_eng:normEng(s.eng),_rotations:getRotations(s),_lining:liningMap.get(coreName(s.name||''))||null,_core:coreName(s.name||'')}));
    tbl.setData(allSpecs);
    applyFilters();
    if (_qParam) { tbl.searchQuery = _qParam; tbl._filter(); tbl.render(); }
  }catch(e){
    document.getElementById('tbl-container').innerHTML=`<div style="padding:40px;text-align:center">
      <p style="font-weight:800;color:var(--danger);margin-bottom:8px">${e.message||'خطأ في التحميل'}</p>
      <p style="font-size:12px;color:var(--text-3);line-height:2">تأكد من Firestore rules + الاتصال + الاستيراد من <a href="settings.html" style="color:var(--teal)">الإعدادات</a></p>
      <button onclick="location.reload()" style="margin-top:14px;padding:9px 22px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">إعادة المحاولة</button>
    </div>`;
    console.error('canals load error:',e);
  }
})();

// ══ Filters ══
const ARABIC_LETTERS='ا ب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ك ل م ن ه و ي'.split(' ');
const ENG_LIST=['الجيزة','العياط','المنصورية','الرياح','إمبابة','مزغونة'];
const ROT_LIST=['أ','ب','جـ'];
const LINING_LIST=[{v:'all',l:'الكل'},{v:'yes',l:'مبطنة'},{v:'no',l:'غير مبطنة'}];

document.getElementById('letter-row').innerHTML=ARABIC_LETTERS.map(L=>`<button class="letter-btn" data-letter="${L}">${L}</button>`).join('');
document.getElementById('eng-row').innerHTML=ENG_LIST.map(e=>`<button class="filter-chip" data-eng="${e}">${e}</button>`).join('');
document.getElementById('rot-row').innerHTML=ROT_LIST.map(r=>`<button class="filter-chip" data-rot="${r}">${r}</button>`).join('');
document.getElementById('lining-row').innerHTML=LINING_LIST.map(x=>`<button class="filter-chip${x.v==='all'?' active':''}" data-lining="${x.v}">${x.l}</button>`).join('');

let activeLetter=null,activeEngs=new Set(),activeRots=new Set(),activeLining='all';

document.getElementById('letter-row').addEventListener('click',e=>{const b=e.target.closest('.letter-btn');if(!b)return;activeLetter=activeLetter===b.dataset.letter?null:b.dataset.letter;document.querySelectorAll('.letter-btn').forEach(x=>x.classList.toggle('active',x.dataset.letter===activeLetter));applyFilters();});
document.getElementById('eng-row').addEventListener('click',e=>{const b=e.target.closest('.filter-chip');if(!b)return;const v=b.dataset.eng;activeEngs.has(v)?activeEngs.delete(v):activeEngs.add(v);b.classList.toggle('active',activeEngs.has(v));applyFilters();});
document.getElementById('rot-row').addEventListener('click',e=>{const b=e.target.closest('.filter-chip');if(!b)return;const v=b.dataset.rot;activeRots.has(v)?activeRots.delete(v):activeRots.add(v);b.classList.toggle('active',activeRots.has(v));applyFilters();});
document.getElementById('lining-row').addEventListener('click',e=>{const b=e.target.closest('.filter-chip');if(!b)return;activeLining=b.dataset.lining;document.querySelectorAll('#lining-row .filter-chip').forEach(x=>x.classList.toggle('active',x.dataset.lining===activeLining));applyFilters();});
document.getElementById('f-len-min').addEventListener('input',applyFilters);
document.getElementById('f-len-max').addEventListener('input',applyFilters);
document.getElementById('btn-clear-filters').addEventListener('click',()=>{activeLetter=null;activeEngs.clear();activeRots.clear();activeLining='all';document.querySelectorAll('.letter-btn,.filter-chip').forEach(b=>b.classList.remove('active'));document.querySelectorAll('#lining-row .filter-chip[data-lining="all"]').forEach(b=>b.classList.add('active'));document.getElementById('f-len-min').value='';document.getElementById('f-len-max').value='';applyFilters();});
document.getElementById('filter-toggle').addEventListener('click',()=>{const b=document.getElementById('filter-body');const open=b.style.display!=='none';b.style.display=open?'none':'block';document.getElementById('filter-chevron').classList.toggle('open',!open);});

function applyFilters(){
  const lMin=parseFloat(document.getElementById('f-len-min').value),lMax=parseFloat(document.getElementById('f-len-max').value);
  const hasF=activeLetter||activeEngs.size||activeRots.size||activeLining!=='all'||!isNaN(lMin)||!isNaN(lMax);
  tbl.setExtraFilter(hasF?(row)=>{
    if(activeLetter&&!coreName(row.name||'').startsWith(activeLetter))return false;
    if(activeEngs.size&&!activeEngs.has(row._eng))return false;
    if(activeRots.size&&!row._rotations.some(r=>activeRots.has(r)))return false;
    if(activeLining==='yes'&&!row._lining)return false;
    if(activeLining==='no'&&row._lining)return false;
    const v=parseFloat(row.length);if(!isNaN(lMin)&&!(v>=lMin))return false;if(!isNaN(lMax)&&!(v<=lMax))return false;
    return true;
  }:null);
  const cnt=tbl.filtered.length,tot=tbl.allData.length;
  document.getElementById('filter-count').textContent=tot>0?(hasF?`${cnt} من ${tot} ترعة`:`${tot} ترعة`):'';
}

// ══ Export ══
document.getElementById('btn-export').addEventListener('click',async()=>{
  if(!tbl.filtered.length){toast('لا توجد بيانات للتصدير','error');return;}
  const rows=tbl.filtered.map(r=>({name:r.name||'',eng:r._eng||'',feeder:r.canalName||r.feeder||'',length:r.length||'',zomam:r.zomam||'',discharge:r.discharge||'',rotations:r._rotations.join(' / ')||'',lined:r._lining?'مبطنة':'',linedLength:r._lining?.linedLength||r._lining?.totalLength||'',liningType:r._lining?.liningType||'',notes:r.notes||''}));
  await exportToExcel({title:'تقرير ترع الإدارة — محافظة الجيزة',subtitle:activeEngs.size?[...activeEngs].join(' / '):'كل الإدارات',
    columns:[{key:'name',label:'اسم الترعة',width:28},{key:'eng',label:'الإدارة الهندسية',width:14},{key:'feeder',label:'المغذية',width:20},{key:'length',label:'الطول (كم)',width:12},{key:'zomam',label:'الزمام (فدان)',width:14},{key:'discharge',label:'القنن المائي',width:14},{key:'rotations',label:'المناوبة',width:10},{key:'lined',label:'مبطنة؟',width:8},{key:'linedLength',label:'الطول المبطن (كم)',width:16},{key:'liningType',label:'نوع التبطين',width:16},{key:'notes',label:'ملاحظات',width:30}],
    rows,filename:`ترع_الإدارة_${new Date().toISOString().slice(0,10)}.xlsx`});
  toast('تم التصدير بنجاح','success');
});
document.getElementById('btn-export-pdf').addEventListener('click',async()=>{
  if(!tbl.filtered.length){toast('لا توجد بيانات للتصدير','error');return;}
  const rows=tbl.filtered.map(r=>({name:r.name||'',eng:r._eng||'',feeder:r.canalName||r.feeder||'',length:r.length||'',rotations:r._rotations.join(' / ')||'',lined:r._lining?'مبطنة':'غير مبطنة'}));
  await exportToPDF({title:'تقرير ترع الإدارة — محافظة الجيزة',subtitle:activeEngs.size?[...activeEngs].join(' / '):'كل الإدارات',
    columns:[{key:'name',label:'اسم الترعة'},{key:'eng',label:'الإدارة'},{key:'feeder',label:'المغذية'},{key:'length',label:'الطول (كم)'},{key:'rotations',label:'المناوبة'},{key:'lined',label:'التبطين'}],
    rows,filename:`ترع_الإدارة_${new Date().toISOString().slice(0,10)}.pdf`});
  toast('تم التصدير بنجاح','success');
});

// ══ View ══
function openView(spec){
  currentItem=spec;
  document.getElementById('view-name').textContent=spec.name||'تفاصيل';
  const sections=Array.isArray(spec.sections)?spec.sections:[];
  const fs=sections.find(s=>s.bed_width&&parseFloat(s.bed_width)>0)||sections[0]||null;
  const rots=spec._rotations||[];const hasLining=!!spec._lining;const ln=spec._lining||{};
  let html=`<div style="padding:14px 20px 0">
    <div class="spec-detail-grid">
      <div class="spec-kv"><div class="sk">الإدارة الهندسية</div><div class="sv" style="font-size:13px">${spec._eng||'—'}</div></div>
      <div class="spec-kv"><div class="sk">الطول الكلي</div><div class="sv">${spec.length||'—'} كم</div></div>
      <div class="spec-kv"><div class="sk">الزمام</div><div class="sv" style="font-size:13px">${spec.zomam?Number(spec.zomam).toLocaleString('ar-EG'):spec.zomam||'—'} فدان</div></div>
      <div class="spec-kv"><div class="sk">القنن المائي</div><div class="sv">${spec.discharge||55} م³</div></div>
      <div class="spec-kv"><div class="sk">المغذية</div><div class="sv" style="font-size:12px">${spec.canalName||spec.feeder||'—'}</div></div>
      <div class="spec-kv"><div class="sk">المناوبات</div><div class="sv">${rots.length?rotBadgeHtml(rots):'—'}</div></div>
      <div class="spec-kv"><div class="sk">عدد المقاطع</div><div class="sv">${sections.length||'—'}</div></div>
      <div class="spec-kv"><div class="sk">التبطين</div><div class="sv">${hasLining?'<span class="badge badge-teal">مبطنة</span>':'<span class="badge badge-gray">غير مبطنة</span>'}</div></div>
    </div>`;
  if(hasLining)html+=`<div class="lining-block"><h4>بيانات التبطين</h4><div class="spec-detail-grid">
    ${ln.totalLength?`<div class="spec-kv"><div class="sk">الطول الكلي (كم)</div><div class="sv">${ln.totalLength}</div></div>`:''}
    ${ln.linedLength?`<div class="spec-kv"><div class="sk">المبطن (كم)</div><div class="sv">${ln.linedLength}</div></div>`:''}
    ${ln.liningType?`<div class="spec-kv"><div class="sk">نوع التبطين</div><div class="sv">${ln.liningType}</div></div>`:''}
    ${ln.width?`<div class="spec-kv"><div class="sk">العرض (م)</div><div class="sv">${ln.width}</div></div>`:''}
    ${ln.condition?`<div class="spec-kv"><div class="sk">الحالة</div><div class="sv"><span class="badge badge-teal">${ln.condition}</span></div></div>`:''}
  </div></div>`;
  if(fs&&fs.bed_width)html+=`<div class="cross-canvas-wrap" style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--text-2);text-align:center;margin-bottom:4px">القطاع العرضي — كم ${fs.from_km||'؟'}→${fs.to_km||'؟'}</div><canvas id="ccv" style="display:block;width:100%"></canvas></div>`;
  if(sections.length)html+=`<div style="margin-top:14px;font-size:13px;font-weight:800;margin-bottom:6px">المقاطع (${sections.length})</div>
    <div class="sections-desktop" style="overflow-x:auto"><table class="sections-tbl"><thead><tr><th>من كم</th><th>إلى كم</th><th>عرض القاع</th><th>الميل</th><th>منسوب القاع</th><th>أقصى منسوب</th><th>أقل منسوب</th><th>المناوبة</th></tr></thead><tbody>
    ${sections.map(s=>`<tr><td><code>${s.from_km||'—'}</code></td><td><code>${s.to_km||'—'}</code></td><td style="color:var(--teal);font-weight:700">${s.bed_width||'—'}</td><td>${fixSideSlope(s.side_slope)||'—'}</td><td style="color:#c62828;font-weight:700">${s.bed_level||'—'}</td><td style="color:#00897b;font-weight:700">${s.max_water||'—'}</td><td style="color:#0277bd;font-weight:700">${s.min_water||'—'}</td><td>${s.rotation?`<span class="badge badge-amber" style="font-size:10px">${s.rotation}</span>`:''}</td></tr>`).join('')}
    </tbody></table></div>
    <div class="sections-mobile">${sections.map((s,i)=>`<div class="section-card"><div class="section-card-head"><span>مقطع ${i+1}</span><span class="badge badge-amber">${s.rotation||'—'}</span></div><div class="section-card-grid"><div><span class="sk">عرض القاع</span><span class="sv2" style="color:var(--teal)">${s.bed_width||'—'}</span></div><div><span class="sk">الميل</span><span class="sv2">${fixSideSlope(s.side_slope)||'—'}</span></div><div><span class="sk">منسوب القاع</span><span class="sv2" style="color:#c62828">${s.bed_level||'—'}</span></div><div><span class="sk">أقصى منسوب</span><span class="sv2" style="color:#00897b">${s.max_water||'—'}</span></div></div></div>`).join('')}</div>`;
  html+=mapsLinkHtml(spec)+'</div>';
  document.getElementById('view-body').innerHTML=html;
  document.getElementById('view-footer').style.display='';
  openModal('modal-view');
  if(fs&&fs.bed_width)setTimeout(()=>drawCross(fs),60);
}
document.getElementById('view-close').addEventListener('click',()=>closeModal('modal-view'));
document.getElementById('modal-view').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('modal-view');});
document.getElementById('btn-edit').addEventListener('click',()=>{closeModal('modal-view');openForm(currentItem);});
document.getElementById('btn-delete').addEventListener('click',()=>{ confirmDelete(document.getElementById('btn-delete'),async()=>{ await deleteRecord('specs',currentItem.id);closeModal('modal-view');toast('تم الحذف','success');location.reload(); }); });

// ══ Form ══
const FF=['name','eng','canalName','bank','length','zomam','discharge','notes'];
document.getElementById('btn-add').addEventListener('click',()=>openForm(null));
document.getElementById('form-close').addEventListener('click',()=>closeModal('modal-form'));
document.getElementById('modal-form').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('modal-form');});
document.getElementById('btn-cancel').addEventListener('click',()=>closeModal('modal-form'));
wireLocationButton('btn-gps','f-lat','f-lng');
function openForm(item){ document.getElementById('form-title').textContent=item?'تعديل الترعة':'إضافة ترعة جديدة'; FF.forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value=item?.[k]??'';}); document.getElementById('f-lat').value=item?.lat??''; document.getElementById('f-lng').value=item?.lng??''; openModal('modal-form'); }
document.getElementById('btn-save').addEventListener('click',async()=>{
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('اسم الترعة مطلوب','error');return;}
  const data={};FF.forEach(k=>{const v=document.getElementById('f-'+k).value.trim();if(v)data[k]=v;});
  const lat=document.getElementById('f-lat').value.trim(),lng=document.getElementById('f-lng').value.trim();
  if(lat)data.lat=parseFloat(lat);if(lng)data.lng=parseFloat(lng);
  const btn=document.getElementById('btn-save');btn.disabled=true;const orig=btn.textContent;btn.textContent='جاري الحفظ…';
  try{
    if(currentItem&&document.getElementById('form-title').textContent.includes('تعديل')){await updateRecord('specs',currentItem.id,data);toast('تم التعديل','success');}
    else{await addRecord('specs',data);toast('تمت الإضافة','success');}
    closeModal('modal-form');currentItem=null;location.reload();
  }finally{btn.disabled=false;btn.textContent=orig;}
});
