<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سُقيا — الترع المبطنة</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><div class="sb-logo">💧</div><div class="sb-brand-text"><h2>سُقيا</h2><span>منصة إدارة أصول ري الجيزة</span></div></div>
    <nav class="sb-nav">
      <div class="sb-section">الرئيسية</div>
      <a class="nav-item" href="dashboard.html"><span class="ni">🏠</span> لوحة التحكم</a>
      <div class="sb-section">البيانات الهندسية</div>
      <a class="nav-item" href="specs.html">   <span class="ni">📐</span> الأورنيك الهندسي</a>
      <a class="nav-item" href="bridges.html"> <span class="ni">🌉</span> الكباري</a>
      <a class="nav-item" href="canals.html">  <span class="ni">🌊</span> الترع المبطنة</a>
      <a class="nav-item" href="wells.html">   <span class="ni">⛏️</span> الآبار الجوفية</a>
      <div class="sb-section admin-only" style="display:none">الإدارة</div>
      <a class="nav-item admin-only" href="settings.html" style="display:none"><span class="ni">⚙️</span> الإعدادات</a>
    </nav>
    <div class="sb-footer">
      <div class="sb-user"><div class="sb-avatar" id="sb-avatar">م</div><div><div class="sb-uname" id="sb-user-name">...</div><span class="sb-role" id="sb-user-role">...</span></div></div>
      <button class="sb-logout" id="btn-logout">🚪 تسجيل الخروج</button>
    </div>
  </aside>
  <div id="sb-overlay"></div>

  <div class="main">
    <header class="topbar">
      <button class="mob-btn" id="mob-btn">☰</button>
      <div class="tb-title"><div class="tb-bc">سُقيا › البيانات الهندسية</div><div class="tb-page">🌊 الترع المبطنة</div></div>
      <div class="tb-actions">
        <div class="tb-date" id="tb-date"></div>
        <div class="tb-live"><div class="dot"></div><span>متصل</span></div>
        <button class="btn btn-primary admin-only" id="btn-add" style="display:none">+ إضافة</button>
      </div>
    </header>
    <main class="page">
      <div class="card" id="tbl-container"><div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div></div>
    </main>
  </div>
</div>

<!-- VIEW -->
<div class="modal-overlay" id="modal-view">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><h3>🌊 <span id="view-title"></span></h3><button class="modal-close">✕</button></div>
    <div class="modal-body" id="view-body"></div>
    <div class="modal-footer admin-only" style="display:none">
      <button class="btn btn-secondary btn-sm" id="btn-delete">🗑️ حذف</button>
      <button class="btn btn-primary btn-sm" id="btn-edit">✏️ تعديل</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="modal-overlay" id="modal-form">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><h3 id="form-title">➕ إضافة ترعة مبطنة</h3><button class="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">اسم الترعة *</label><input class="form-input" id="f-name" placeholder="ترعة الحاجة" /></div>
        <div class="form-group">
          <label class="form-label">المركز</label>
          <select class="form-input" id="f-district">
            <option value="">-- اختر --</option>
            <option>أبو النمرس</option><option>الحوامدية</option><option>البدرشين</option>
            <option>العياط</option><option>منشأة القناطر</option><option>أوسيم</option>
            <option>إمبابة</option><option>الجيزة</option><option>أخرى</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">الموقع التفصيلي</label><input class="form-input" id="f-location" placeholder="من كيلو 0 حتى كيلو 5" /></div>
        <div class="form-group"><label class="form-label">الطول الكلي (م)</label><input class="form-input" id="f-totalLength" type="number" placeholder="5000" /></div>
        <div class="form-group"><label class="form-label">الطول المبطن (م)</label><input class="form-input" id="f-linedLength" type="number" placeholder="3000" /></div>
        <div class="form-group">
          <label class="form-label">نوع التبطين</label>
          <select class="form-input" id="f-liningType">
            <option value="">-- اختر --</option>
            <option>خرسانة عادية</option><option>خرسانة مسلحة</option>
            <option>بلاطات خرسانية</option><option>مونة اسمنتية</option>
            <option>HDPE</option><option>أخرى</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">العرض (م)</label><input class="form-input" id="f-width" type="number" placeholder="3.0" /></div>
        <div class="form-group"><label class="form-label">العمق (م)</label><input class="form-input" id="f-depth" type="number" placeholder="1.5" /></div>
        <div class="form-group"><label class="form-label">سنة التبطين</label><input class="form-input" id="f-buildYear" type="number" placeholder="2015" /></div>
        <div class="form-group">
          <label class="form-label">الحالة</label>
          <select class="form-input" id="f-condition">
            <option value="">-- اختر --</option>
            <option>ممتاز</option><option>جيد</option><option>متوسط</option>
            <option>يحتاج صيانة</option><option>تالف</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label class="form-label">ملاحظات</label><textarea class="form-input" id="f-notes" rows="2" placeholder="ملاحظات إضافية"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" id="btn-cancel">إلغاء</button>
      <button class="btn btn-primary btn-sm" id="btn-save">💾 حفظ</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, clearSession, getCollection, addRecord, updateRecord, deleteRecord } from "../js/firebase-config.js";
  import { setupSidebar, setActiveNav, arabicDate, renderSidebarUser, DataTable, openModal, closeModal, setupModalClose, toast, confirmDelete } from "../js/shared.js";

  const user = requireAuth();
  renderSidebarUser(user); setupSidebar(); setActiveNav();
  document.getElementById("tb-date").textContent = "📅 " + arabicDate();
  document.getElementById("btn-logout").addEventListener("click", () => { clearSession(); location.href = "../index.html"; });
  if (user.role === "admin") document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");

  const COND_BADGE = {"ممتاز":"badge-green","جيد":"badge-teal","متوسط":"badge-blue","يحتاج صيانة":"badge-amber","تالف":"badge-red"};
  const FIELDS = [
    {key:"name",label:"اسم الترعة"},{key:"district",label:"المركز"},
    {key:"location",label:"الموقع"},{key:"totalLength",label:"الطول الكلي (م)"},
    {key:"linedLength",label:"الطول المبطن (م)"},{key:"liningType",label:"نوع التبطين"},
    {key:"width",label:"العرض (م)"},{key:"depth",label:"العمق (م)"},
    {key:"buildYear",label:"سنة التبطين"},{key:"condition",label:"الحالة"},
    {key:"notes",label:"ملاحظات"},
  ];
  const FF = ["name","district","location","totalLength","linedLength","liningType","width","depth","buildYear","condition","notes"];

  const tbl = new DataTable({
    containerId:"tbl-container",
    columns:[
      {key:"name",label:"اسم الترعة",searchable:true},
      {key:"district",label:"المركز",searchable:true},
      {key:"linedLength",label:"المبطن (م)"},
      {key:"liningType",label:"نوع التبطين",searchable:true},
      {key:"condition",label:"الحالة",render:v=>v?`<span class="badge ${COND_BADGE[v]||'badge-gray'}">${v}</span>`:"—"},
    ],
    onRowClick:openView, emptyIcon:"🌊", emptyText:"لا توجد ترع مبطنة",
  });
  async function load() { tbl.setData(await getCollection("linedCanals")); }
  load();

  let current = null;
  function openView(row) {
    current = row;
    document.getElementById("view-title").textContent = row.name || "";
    document.getElementById("view-body").innerHTML = FIELDS.filter(f=>row[f.key]).map(f=>{
      const val = f.key==="condition"?`<span class="badge ${COND_BADGE[row[f.key]]||'badge-gray'}">${row[f.key]}</span>`:row[f.key];
      return `<div class="detail-row"><span class="detail-key">${f.label}</span><span class="detail-val">${val}</span></div>`;
    }).join("");
    openModal("modal-view");
  }
  setupModalClose("modal-view"); setupModalClose("modal-form");
  document.getElementById("btn-edit").addEventListener("click", () => { closeModal("modal-view"); openForm(current); });
  document.getElementById("btn-delete").addEventListener("click", () => {
    confirmDelete(document.getElementById("btn-delete"), async () => {
      await deleteRecord("linedCanals",current.id); closeModal("modal-view"); toast("تم الحذف ✓","success"); load();
    });
  });
  document.getElementById("btn-add").addEventListener("click", () => openForm(null));
  document.getElementById("btn-cancel").addEventListener("click", () => closeModal("modal-form"));
  function openForm(row) {
    document.getElementById("form-title").textContent = row ? "✏️ تعديل الترعة" : "➕ إضافة ترعة مبطنة";
    FF.forEach(k => { document.getElementById("f-"+k).value = row?.[k]??""; });
    openModal("modal-form");
  }
  document.getElementById("btn-save").addEventListener("click", async () => {
    if (!document.getElementById("f-name").value.trim()) { toast("اسم الترعة مطلوب","error"); return; }
    const data = {};
    FF.forEach(k => { const v = document.getElementById("f-"+k).value.trim(); if(v) data[k]=v; });
    const btn = document.getElementById("btn-save");
    btn.disabled=true; btn.textContent="⏳ جاري الحفظ...";
    try {
      if (current && document.getElementById("form-title").textContent.includes("تعديل")) {
        await updateRecord("linedCanals",current.id,data); toast("تم التعديل ✓","success");
      } else { await addRecord("linedCanals",data); toast("تمت الإضافة ✓","success"); }
      closeModal("modal-form"); current=null; load();
    } finally { btn.disabled=false; btn.textContent="💾 حفظ"; }
  });
</script>
</body>
</html>
