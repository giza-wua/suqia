<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

<script type="module">
import { requireAuth, clearSession, getCollection, addRecord, updateRecord, deleteRecord, logActivity } from "../js/firebase-config.js?v=1.2.5";
import { wireThemeToggle, arabicDate, DataList, openModal, closeModal, setupModalClose, toast, confirmDelete, wireLocationButton, mapsLinkHtml, exportToExcel, exportToPDF, wireConnectionStatus } from "../js/shared.js?v=1.2.5";

const user = requireAuth();

(function(){
  const av=document.getElementById('sb-avatar'),nm=document.getElementById('sb-user-name'),rl=document.getElementById('sb-user-role');
  const init=user.name.trim().split(' ').slice(0,2).map(w=>w[0]).join('');
  if(av)av.textContent=init; if(nm)nm.textContent=user.name;
  if(rl)rl.textContent=user.role==='admin'?'مشرف':'مستخدم';
  const pg=location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item, .bn-item').forEach(a=>{if(a.getAttribute('href')===pg)a.classList.add('active');});
  const sb=document.getElementById('sidebar'),ov=document.getElementById('sb-overlay'),mb=document.getElementById('mob-btn');
  if(mb)mb.addEventListener('click',()=>{sb.classList.toggle('open');ov.classList.toggle('show');});
  if(ov)ov.addEventListener('click',()=>{sb.classList.remove('open');ov.classList.remove('show');});
  document.getElementById('btn-logout').addEventListener('click',async()=>{await logActivity('تسجيل خروج');clearSession();location.href='../index.html';});
})();

wireThemeToggle();
wireConnectionStatus();
document.getElementById('tb-date').textContent = arabicDate();
if (user.role !== 'viewer') {
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
}

const _qParam = new URLSearchParams(location.search).get('q');

const COND_BADGE = {"ممتاز":"badge-green","جيد":"badge-teal","متوسط":"badge-blue","يحتاج صيانة":"badge-amber","حرج":"badge-red"};
const FIELDS     = [{key:"name",label:"اسم الكبري"},{key:"bridgeType",label:"النوع"},{key:"location",label:"الموقع"},{key:"canalName",label:"الترعة"},{key:"span",label:"الفتحة (م)"},{key:"width",label:"العرض (م)"},{key:"load",label:"الحمل (طن)"},{key:"material",label:"مادة الإنشاء"},{key:"buildYear",label:"سنة الإنشاء"},{key:"condition",label:"الحالة"},{key:"notes",label:"ملاحظات"}];
const FF         = ["name","bridgeType","location","canalName","span","width","load","material","buildYear","condition","notes"];

const tbl = new DataList({
  containerId: "tbl-container",
  columns: [
    {key:"name",      label:"اسم الكبري",  searchable:true},
    {key:"canalName", label:"الترعة",      searchable:true, renderText:v=>v},
    {key:"location",  label:"الموقع",      searchable:true, renderText:v=>v},
    {key:"condition", label:"الحالة",      badge:true,
      render: v => v ? `<span class="badge ${COND_BADGE[v]||'badge-gray'}">${v}</span>` : ""},
  ],
  onRowClick: openView,
  emptyIcon: "",
  emptyText: "لا توجد كباري — استورد البيانات من الإعدادات أو أضف بنفسك",
  pageSize: 30,
});

(async () => {
  try {
    const data = await getCollection("bridges");
    tbl.setData(data);
    applyFilters();
    if (_qParam) { tbl.searchQuery = _qParam; tbl._filter(); tbl.render(); }
  } catch(e) {
    const el = document.getElementById('tbl-container');
    if(el) el.innerHTML = `<div style="padding:40px;text-align:center">
      <p style="font-weight:800;color:var(--danger);margin-bottom:8px">${e.message||'خطأ في التحميل'}</p>
      <p style="font-size:12px;color:var(--text-3);line-height:2">تأكد من Firestore rules + <a href="settings.html" style="color:var(--teal)">استيراد البيانات</a></p>
      <button onclick="location.reload()" style="margin-top:14px;padding:9px 22px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">إعادة المحاولة</button>
    </div>`;
    console.error('bridges load:', e);
  }
})();


const TYPES = ['كبري طرق','كبري سكك حديدية','عبارة مستطيلة','عبارة دائرية','كبري مشاة','أخرى'];

const activeTypes = new Set();


document.getElementById('type-row').innerHTML   = TYPES.map(t=>`<button class="filter-chip" data-type="${t}">${t}</button>`).join('');
document.getElementById('f-load-min').addEventListener('input', applyFilters);
document.getElementById('f-load-max').addEventListener('input', applyFilters);

document.getElementById('type-row').addEventListener('click', e => {
  const b = e.target.closest('.filter-chip'); if(!b) return;
  const v = b.dataset.type;
  activeTypes.has(v) ? activeTypes.delete(v) : activeTypes.add(v);
  b.classList.toggle('active', activeTypes.has(v));
  applyFilters();
});
document.getElementById('btn-clear-filters').addEventListener('click', () => {
  activeTypes.clear();
  document.querySelectorAll('.letter-btn,.filter-chip').forEach(b => b.classList.remove('active'));
  document.getElementById('f-load-min').value = ''; document.getElementById('f-load-max').value = '';
  applyFilters();
});
document.getElementById('filter-toggle').addEventListener('click', () => {
  const b = document.getElementById('filter-body');
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  document.getElementById('filter-chevron').classList.toggle('open', !open);
});

function coreName(name) {
  let n = (name||'').trim();
  n = n.replace(/^(ترعة|فرع|مسقة|وصلة|دليل|ذيل|إمتداد|مغذى)\s+/, '');
  n = n.replace(/^["']?\d+["']?\s*/, ''); n = n.replace(/^["']/, '');
  return n.trim() || name.trim();
}

function applyFilters() {
  const lMin = parseFloat(document.getElementById('f-load-min').value);
  const lMax = parseFloat(document.getElementById('f-load-max').value);
  const hasF = activeTypes.size || !isNaN(lMin) || !isNaN(lMax);
  tbl.setExtraFilter(hasF ? row => {
    if(activeTypes.size && !activeTypes.has((row.bridgeType||'').trim())) return false;
    const v = parseFloat(row.load);
    if(!isNaN(lMin) && !(v >= lMin)) return false;
    if(!isNaN(lMax) && !(v <= lMax)) return false;
    return true;
  } : null);
  const cnt = tbl.filtered.length, tot = tbl.allData.length;
  document.getElementById('filter-count').textContent = tot > 0 ? (hasF ? `${cnt} من ${tot} كبري` : `${tot} كبري`) : '';
}

document.getElementById('btn-export').addEventListener('click', async () => {
  if(!tbl.filtered.length) { toast('لا توجد بيانات للتصدير','error'); return; }
  await exportToExcel({
    title:'تقرير الكباري', subtitle:'كل السجلات',
    columns:[{key:'name',label:'اسم الكبري',width:30},{key:'canalName',label:'الترعة',width:22},{key:'bridgeType',label:'النوع',width:14},{key:'location',label:'الموقع',width:16},{key:'load',label:'الحمل (طن)',width:14},{key:'condition',label:'الحالة',width:14},{key:'notes',label:'ملاحظات',width:30}],
    rows: tbl.filtered, filename: `كباري_${new Date().toISOString().slice(0,10)}.xlsx`,
  });
  toast(`تم تصدير ${tbl.filtered.length} سجل ✓`,'success');
});
document.getElementById('btn-export-pdf').addEventListener('click', async () => {
  if(!tbl.filtered.length) { toast('لا توجد بيانات للتصدير','error'); return; }
  await exportToPDF({
    title:'تقرير الكباري', subtitle:'كل السجلات',
    columns:[{key:'name',label:'اسم الكبري'},{key:'canalName',label:'الترعة'},{key:'bridgeType',label:'النوع'},{key:'location',label:'الموقع'},{key:'condition',label:'الحالة'}],
    rows: tbl.filtered, filename: `كباري_${new Date().toISOString().slice(0,10)}.pdf`,
  });
  toast(`تم تصدير ${tbl.filtered.length} سجل ✓`,'success');
});

let current = null;
function openView(row) {
  current = row;
  document.getElementById('view-title').textContent = row.name || '';
  const html = FIELDS.filter(f => row[f.key]).map(f => {
    const val = f.key === 'condition'
      ? `<span class="badge ${COND_BADGE[row[f.key]]||'badge-gray'}">${row[f.key]}</span>`
      : row[f.key];
    return `<div class="detail-row"><span class="detail-key">${f.label}</span><span class="detail-val">${val}</span></div>`;
  }).join('') + mapsLinkHtml(row);
  document.getElementById('view-body').innerHTML = html;
  document.getElementById('view-footer').style.display = '';
  openModal('modal-view');
}
setupModalClose('modal-view'); setupModalClose('modal-form');
document.getElementById('btn-edit').addEventListener('click', () => { closeModal('modal-view'); openForm(current); });
document.getElementById('btn-delete').addEventListener('click', () => {
  confirmDelete(document.getElementById('btn-delete'), async () => {
    await deleteRecord('bridges', current.id);
    closeModal('modal-view'); toast('تم الحذف ✓','success');
    tbl.setData(tbl.allData.filter(r => r.id !== current.id));
  });
});

document.getElementById('btn-add').addEventListener('click', () => openForm(null));
document.getElementById('btn-cancel').addEventListener('click', () => closeModal('modal-form'));
wireLocationButton('btn-gps','f-lat','f-lng');

function openForm(item) {
  document.getElementById('form-title').textContent = item ? 'تعديل الكبري' : 'إضافة كبري';
  FF.forEach(k => { const el = document.getElementById('f-'+k); if(el) el.value = item?.[k] ?? ''; });
  document.getElementById('f-lat').value = item?.lat ?? '';
  document.getElementById('f-lng').value = item?.lng ?? '';
  openModal('modal-form');
}

document.getElementById('btn-save').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { toast('اسم الكبري مطلوب','error'); return; }
  const data = {};
  FF.forEach(k => { const v = document.getElementById('f-'+k).value.trim(); if(v) data[k] = v; });
  const lat = document.getElementById('f-lat').value.trim(), lng = document.getElementById('f-lng').value.trim();
  if(lat) data.lat = parseFloat(lat); if(lng) data.lng = parseFloat(lng);
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'جاري الحفظ…';
  try {
    if(current && document.getElementById('form-title').textContent.includes('تعديل')) {
      await updateRecord('bridges', current.id, data); toast('تم التعديل ✓','success');
    } else {
      await addRecord('bridges', data); toast('تمت الإضافة ✓','success');
    }
    closeModal('modal-form'); current = null; location.reload();
  } finally {
    btn.disabled = false; btn.textContent = 'حفظ';
  }
});
</script>
