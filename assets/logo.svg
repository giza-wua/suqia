<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123f3a"/>
      <stop offset="100%" stop-color="#1b6e64"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf6f2"/>
    </linearGradient>
  </defs>

  <!-- خلفية مستديرة بلون هوية "زِمام" -->
  <rect x="0" y="0" width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- زخرفة هندسية خفيفة مستوحاة من نقوش الزخارف المصرية القديمة (تراث) -->
  <g opacity="0.10" stroke="#ffffff" stroke-width="4" fill="none">
    <circle cx="256" cy="256" r="190"/>
    <circle cx="256" cy="256" r="160"/>
  </g>

  <!-- قطرة الماء الأساسية -->
  <path d="M256 96
           C 256 96 190 196 190 252
           C 190 297.5 218.9 328 256 328
           C 293.1 328 322 297.5 322 252
           C 322 196 256 96 256 96 Z"
        fill="url(#dropGrad)"/>

  <!-- بريق داخلي في القطرة -->
  <path d="M228 240 C 228 214 248 190 256 176 C 240 210 236 232 240 258 C 232 254 228 248 228 240 Z"
        fill="#ffffff" opacity="0.55"/>

  <!-- خطوط تدفق المياه في المساقي/الترع، منبعثة من القطرة -->
  <g stroke="#f4c874" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M120 372 C 190 340 322 340 392 372"/>
  </g>
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M96 416 C 180 380 332 380 416 416"/>
  </g>
  <g stroke="#b9692e" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M140 452 C 200 430 312 430 372 452"/>
  </g>
</svg>
